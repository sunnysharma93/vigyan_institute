# Spring Boot Application Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=

# File Upload Configuration
# Upload directory - change this to your desired location
app.upload.dir=./uploads
# Server URL for generating download links
app.server.url=http://localhost:8080

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Jackson Configuration for JSON serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# Logging Configuration
logging.level.com.vigyaninstitute=INFO
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Application Information
spring.application.name=Vigyan Institute Notes API
spring.application.version=1.0.0
